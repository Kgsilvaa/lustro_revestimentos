<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lustro Revestimentos | Alta Engenharia de Pisos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #3d3935; 
            --text-color: #ffffff;
            --accent: #ffffff;
            --card-bg: #4a4541;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; }

        /* HEADER E LOGO AJUSTADA */
        header { padding: 60px 20px; text-align: center; }
        .logo-main { 
            width: 160px; 
            height: auto; 
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.2)); /* Suaviza bordas escuras */
            margin-bottom: 20px; 
        }
        
        /* HERO */
        .hero { padding: 0 10% 80px 10%; text-align: center; }
        .hero h1 { font-weight: 100; font-size: clamp(2.5rem, 7vw, 4.5rem); letter-spacing: 12px; text-transform: uppercase; margin-bottom: 20px; }
        .hero p { font-weight: 300; letter-spacing: 4px; text-transform: uppercase; opacity: 0.7; margin-bottom: 40px; }
        
        .btn-cta { 
            display: inline-block; padding: 20px 50px; border: 1px solid var(--accent); 
            color: var(--accent); text-decoration: none; text-transform: uppercase; 
            letter-spacing: 3px; font-size: 0.8rem; font-weight: 600; transition: 0.4s;
            cursor: pointer;
        }
        .btn-cta:hover { background: var(--accent); color: var(--bg-color); }

        /* GALERIA - APENAS 4 CARDS */
        .work { padding: 60px 5% 100px 5%; }
        .grid-work { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; 
            max-width: 1200px; 
            margin: 0 auto;
        }
        .work-card { background: var(--card-bg); overflow: hidden; position: relative; aspect-ratio: 4/5; }
        .work-card img { width: 100%; height: 100%; object-fit: cover; transition: 1.5s ease; filter: brightness(0.9); }
        .work-card:hover img { transform: scale(1.1); filter: brightness(1.1); }
        
        .work-label { position: absolute; bottom: 30px; left: 30px; border-left: 1px solid white; padding-left: 15px; }
        .work-label span { display: block; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.8; }
        .work-label b { font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase; font-weight: 600; }

        /* CONTATO FINAL */
        .final-cta { padding: 100px 10%; text-align: center; background-color: rgba(0,0,0,0.1); }
        .final-cta h2 { font-weight: 100; font-size: 2rem; margin-bottom: 30px; letter-spacing: 5px; text-transform: uppercase; }

        footer { padding: 40px; text-align: center; font-size: 0.7rem; letter-spacing: 4px; opacity: 0.4; text-transform: uppercase; }

        /* BOTÃO WHATSAPP FIXO */
        .ws-button { 
            position: fixed; bottom: 30px; right: 30px; background: #25d366; 
            color: #fff; width: 60px; height: 60px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 28px; text-decoration: none; box-shadow: 0 10px 25px rgba(0,0,0,0.4); 
            z-index: 1000; transition: 0.3s; 
        }
        .ws-button:hover { transform: scale(1.1); }

        .reveal { opacity: 0; transform: translateY(20px); transition: 0.8s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <header>
        <!-- Ajustado para a logo em jpeg conforme informado -->
        <img src="logo lustro.jpeg" alt="Lustro Revestimentos" class="logo-main">
    </header>

    <section class="hero">
        <h1 class="reveal">Lustro</h1>
        <p class="reveal">Mão de Obra Especializada em Pisos</p>
        <a href="https://api.whatsapp.com/send?phone=5548984617196&text=Olá! Desejo solicitar um orçamento." class="btn-cta reveal">Solicitar Orçamento</a>
    </section>

    <section class="work">
        <div class="grid-work">
            <!-- Seleção de 4 imagens principais como referência de serviço -->
            <div class="work-card reveal">
                <img src="WhatsApp Image 2026-05-04 at 18.25.11.jpeg">
                <div class="work-label"><span>01</span><b>Assentamento de Lastras</b></div>
            </div>
            <div class="work-card reveal">
                <img src="WhatsApp Image 2026-05-04 at 18.25.14.jpeg">
                <div class="work-label"><span>02</span><b>Porcelanatos Premium</b></div>
            </div>
            <div class="work-card reveal">
                <img src="WhatsApp Image 2026-05-04 at 18.25.15.jpeg">
                <div class="work-label"><span>03</span><b>Cozinhas e Banheiros</b></div>
            </div>
            <div class="work-card reveal">
                <img src="WhatsApp Image 2026-05-04 at 18.25.16.jpeg">
                <div class="work-label"><span>04</span><b>Acabamentos de Luxo</b></div>
            </div>
        </div>
    </section>

    <section class="final-cta">
        <h2 class="reveal">Excelência técnica em cada peça</h2>
        <a href="https://api.whatsapp.com/send?phone=5548984617196&text=Olá! Desejo solicitar um orçamento." class="btn-cta reveal">Solicitar Orçamento</a>
    </section>

    <footer>
        LUSTRO REVESTIMENTOS &copy; 2026 | FLORIANÓPOLIS - SC
    </footer>

    <!-- Botão de WhatsApp flutuante -->
    <a href="https://api.whatsapp.com/send?phone=5548984617196" class="ws-button" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) { entry.target.classList.add('active'); }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
