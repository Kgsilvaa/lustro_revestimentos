<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Lustro Revestimentos | Alta Engenharia de Pisos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #3d3935; 
            --text-color: #ffffff;
            --accent: #ffffff;
            --card-bg: #4a4541;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; overflow-x: hidden; }

        /* HEADER COM LOGO REDONDA ATUALIZADA */
        header { padding: 50px 20px; text-align: center; }
        .logo-main { 
            width: 160px; 
            height: 160px; 
            border-radius: 50%; /* Deixa a logo redonda */
            object-fit: cover;  /* Garante que a imagem preencha o círculo sem esticar */
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            transition: 0.5s ease;
        }
        .logo-main:hover { transform: scale(1.05); border-color: var(--accent); }
        
        /* HERO */
        .hero { padding: 0 10% 60px 10%; text-align: center; }
        .hero h1 { font-weight: 100; font-size: clamp(2.5rem, 7vw, 4.5rem); letter-spacing: 12px; text-transform: uppercase; margin-bottom: 20px; }
        .hero p { font-weight: 300; letter-spacing: 4px; text-transform: uppercase; opacity: 0.7; margin-bottom: 40px; }
        
        .btn-cta { 
            display: inline-block; padding: 20px 50px; border: 1px solid var(--accent); 
            color: var(--accent); text-decoration: none; text-transform: uppercase; 
            letter-spacing: 3px; font-size: 0.8rem; font-weight: 600; transition: 0.4s;
            cursor: pointer;
        }
        .btn-cta:hover { background: var(--accent); color: var(--bg-color); }

        /* GALERIA - 4 CARDS ESTRATÉGICOS */
        .work { padding: 40px 5% 80px 5%; }
        .grid-work { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; 
            max-width: 1200px; 
            margin: 0 auto;
        }
        .work-card { background: var(--card-bg); overflow: hidden; position: relative; aspect-ratio: 4/5; border-radius: 4px; }
        .work-card img { width: 100%; height: 100%; object-fit: cover; transition: 1.5s ease; filter: brightness(0.8); }
        .work-card:hover img { transform: scale(1.1); filter: brightness(1); }
        
        .work-label { position: absolute; bottom: 30px; left: 30px; border-left: 1px solid white; padding-left: 15px; }
        .work-label span { display: block; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.8; }
        .work-label b { font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase; font-weight: 600; }

        /* CONTATO FINAL */
        .final-cta { padding: 100px 10%; text-align: center; background-color: rgba(0,0,0,0.15); }
        .final-cta h2 { font-weight: 100; font-size: 2rem; margin-bottom: 30px; letter-spacing: 5px; text-transform: uppercase; }

        footer { padding: 40px; text-align: center; font-size: 0.7rem; letter-spacing: 4px; opacity: 0.4; text-transform: uppercase; }

        /* BOTÃO WHATSAPP PROFISSIONAL */
        .ws-button { 
            position: fixed; bottom: 30px; right: 30px; background: #25d366; 
            color: #fff; width: 65px; height: 65px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 32px; text-decoration: none; box-shadow: 0 10px 25px rgba(0,0,0,0.4); 
            z-index: 1000; transition: 0.3s; 
        }
        .ws-button:hover { transform: scale(1.1); background: #1eb954; }

        /* ANIMAÇÃO DE REVELAÇÃO */
        .reveal { opacity: 0; transform: translateY(25px); transition: 0.8s all ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) { entry.target.classList.add('active'); }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
