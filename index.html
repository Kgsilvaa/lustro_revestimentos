<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lustro Revestimentos | Portfólio Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #111; --text: #333; --bg: #ffffff; --soft-gray: #f9f9f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; scroll-behavior: smooth; }

        /* HEADER */
        header { padding: 40px; text-align: center; }
        .logo-circle {
            width: 130px; height: 130px; margin: 0 auto;
            border-radius: 50%; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: 0.5s;
        }
        .logo-circle img { width: 100%; height: 100%; object-fit: cover; }

        /* HERO COM ZOOM SUAVE */
        .hero {
            height: 85vh; position: relative; display: flex; align-items: center; justify-content: center;
            overflow: hidden; background: #000;
        }
        .hero-img {
            position: absolute; width: 100%; height: 100%;
            background-image: url('WhatsApp Image 2026-05-04 at 18.25.11.jpeg');
            background-size: cover; background-position: center;
            opacity: 0.6; animation: zoomInHero 20s infinite alternate;
        }
        @keyframes zoomInHero { from { transform: scale(1); } to { transform: scale(1.15); } }
        .hero-content { position: relative; z-index: 2; text-align: center; color: white; }
        .hero-content h1 { font-size: clamp(2.5rem, 6vw, 5rem); font-weight: 100; letter-spacing: 15px; text-transform: uppercase; }

        /* GALERIA MASONRY PROFISSIONAL */
        .portfolio { padding: 80px 4%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .grid-item { 
            position: relative; height: 500px; overflow: hidden; 
            opacity: 0; transform: translateY(30px); transition: 1s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        .grid-item.active { opacity: 1; transform: translateY(0); }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; transition: 1.5s ease; }
        .grid-item:hover img { transform: scale(1.1); }
        
        .overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.3);
            display: flex; align-items: flex-end; padding: 30px; opacity: 0; transition: 0.5s;
        }
        .grid-item:hover .overlay { opacity: 1; }
        .overlay span { color: white; text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem; }

        /* CTA */
        .cta { padding: 100px 10%; text-align: center; background: var(--soft-gray); }
        .btn-lux {
            display: inline-block; padding: 20px 50px; border: 1px solid #111;
            text-decoration: none; color: #111; text-transform: uppercase;
            letter-spacing: 4px; font-size: 0.75rem; transition: 0.4s;
        }
        .btn-lux:hover { background: #000; color: #fff; }

        /* FLOAT WHATSAPP */
        .ws-float { position: fixed; bottom: 30px; right: 30px; background: #000; color: #fff; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 24px; z-index: 1000; transition: 0.3s; }
        .ws-float:hover { transform: scale(1.1); background: #25d366; }

        footer { padding: 50px; text-align: center; font-size: 0.65rem; letter-spacing: 4px; color: #aaa; text-transform: uppercase; }
    </style>
</head>
<body>

    <header>
        <div class="logo-circle">
            <img src="logo lustro.jpeg" alt="Lustro Revestimentos">
        </div>
    </header>

    <section class="hero">
        <div class="hero-img"></div>
        <div class="hero-content">
            <h1>Lustro</h1>
        </div>
    </section>

    <section class="portfolio">
        <div class="grid">
            <div class="grid-item"><img src="WhatsApp Image 2026-05-04 at 18.25.14.jpeg"><div class="overlay"><span>Alta Performance</span></div></div>
            <div class="grid-item"><img src="WhatsApp Image 2026-05-04 at 18.25.15.jpeg"><div class="overlay"><span>Design de Interiores</span></div></div>
            <div class="grid-item"><img src="WhatsApp Image 2026-05-04 at 18.25.14 (1).jpeg"><div class="overlay"><span>Precisão Técnica</span></div></div>
            <div class="grid-item"><img src="WhatsApp Image 2026-05-04 at 18.25.15 (1).jpg"><div class="overlay"><span>Acabamento Fino</span></div></div>
            <div class="grid-item"><img src="WhatsApp Image 2026-05-04 at 18.25.14 (2).jpeg"><div class="overlay"><span>Áreas Nobres</span></div></div>
            <div class="grid-item"><img src="WhatsApp Image 2026-05-04 at 18.25.14 (3).jpg"><div class="overlay"><span>Especialista em Lastras</span></div></div>
            <div class="grid-item"><img src="WhatsApp Image 2026-05-04 at 18.25.16.jpeg"><div class="overlay"><span>Qualidade Garantida</span></div></div>
            <div class="grid-item"><img src="WhatsApp Image 2026-05-04 at 18.25.16 (1).jpeg"><div class="overlay"><span>Florianópolis & Região</span></div></div>
        </div>
    </section>

    <section class="cta">
        <a href="https://api.whatsapp.com/send?phone=5548984617196" class="btn-lux">Agendar Orçamento Especializado</a>
    </section>

    <footer>
        Lustro Revestimentos | 2025
    </footer>

    <a href="https://api.whatsapp.com/send?phone=5548984617196" class="ws-float">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.grid-item').forEach(item => {
            observer.observe(item);
        });
    </script>
</body>
</html>
